name: Public Startup PR Opener

on:
  push:
    branches:
      - sync/public-startup-mirror
  workflow_dispatch: {}
  repository_dispatch:
    types: [public-startup-mirror-published]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: public-startup-pr-opener-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.expected_head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  open-or-update:
    if: ${{ github.repository == 'borislavppetrov-beep/elementary-control-startup' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EXPECTED_HEAD_SHA: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.expected_head_sha || github.sha }}
      REQUESTED_PRIMARY_SOURCE_SHA: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.primary_source_sha || '' }}
      MIRROR_BRANCH: sync/public-startup-mirror
      OPENER_CONTRACT_VERSION: "1.1.0"
    steps:
      - name: Checkout exact startup candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ env.EXPECTED_HEAD_SHA }}
          fetch-depth: 1
          persist-credentials: false

      - name: Validate repository dispatch and exact branch binding
        id: payload
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$OPENER_CONTRACT_VERSION" = '1.1.0'
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD_SHA"
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import re
          import urllib.parse
          import urllib.request

          expected = os.environ['EXPECTED_HEAD_SHA']
          requested_source = os.environ.get('REQUESTED_PRIMARY_SOURCE_SHA', '')
          branch = os.environ['MIRROR_BRANCH']
          repository = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GH_TOKEN']
          event_name = os.environ['GITHUB_EVENT_NAME']
          if re.fullmatch(r'[0-9a-f]{40}', expected) is None:
              raise SystemExit('PUBLIC_STARTUP_PR_BRANCH_BINDING=FAIL invalid_expected_head')
          if event_name == 'repository_dispatch':
              if re.fullmatch(r'[0-9a-f]{40}', requested_source) is None:
                  raise SystemExit('PUBLIC_STARTUP_REPOSITORY_DISPATCH=FAIL invalid_primary_source')
          elif requested_source:
              raise SystemExit('PUBLIC_STARTUP_REPOSITORY_DISPATCH=FAIL unexpected_primary_source')

          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'ELEMENTARY-Public-Startup-PR-Opener',
          }
          encoded_branch = urllib.parse.quote(branch, safe='')
          request = urllib.request.Request(
              f'https://api.github.com/repos/{repository}/git/ref/heads/{encoded_branch}',
              headers=headers,
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              remote = json.load(response).get('object', {}).get('sha')
          if remote != expected:
              raise SystemExit(
                  f'PUBLIC_STARTUP_PR_BRANCH_BINDING=FAIL expected={expected} remote={remote}'
              )

          manifest_path = pathlib.Path(
              'contracts/governance/public-startup-mirror-payload-manifest-v1.json'
          )
          data = json.loads(manifest_path.read_text(encoding='utf-8'))
          if data.get('schema') != 'elementary.public-startup-mirror-payload.v1':
              raise SystemExit('PUBLIC_STARTUP_PR_SOURCE_BINDING=FAIL invalid_schema')
          if data.get('status') != 'PASS':
              raise SystemExit('PUBLIC_STARTUP_PR_SOURCE_BINDING=FAIL invalid_status')
          source_sha = data.get('source_sha')
          if re.fullmatch(r'[0-9a-f]{40}', source_sha or '') is None:
              raise SystemExit('PUBLIC_STARTUP_PR_SOURCE_BINDING=FAIL invalid_source_sha')
          if requested_source and source_sha != requested_source:
              raise SystemExit(
                  f'PUBLIC_STARTUP_PR_SOURCE_BINDING=FAIL requested={requested_source} observed={source_sha}'
              )
          if data.get('forbidden_value_scan') != 'PASS':
              raise SystemExit('PUBLIC_STARTUP_PR_SOURCE_BINDING=FAIL forbidden_scan')
          if data.get('read_order_validated') is not True:
              raise SystemExit('PUBLIC_STARTUP_PR_SOURCE_BINDING=FAIL read_order')

          output = pathlib.Path(os.environ['GITHUB_OUTPUT'])
          with output.open('a', encoding='utf-8') as handle:
              handle.write(f'source_sha={source_sha}\n')
          print(f'PUBLIC_STARTUP_REPOSITORY_DISPATCH=PASS event={event_name}')
          print(f'PUBLIC_STARTUP_PR_BRANCH_BINDING=PASS head_sha={expected}')
          print(f'PUBLIC_STARTUP_PR_SOURCE_BINDING=PASS source_sha={source_sha}')
          PY

      - name: Open or update exact startup pull request
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PRIMARY_SOURCE_SHA: ${{ steps.payload.outputs.source_sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          token = os.environ['GH_TOKEN']
          repository = os.environ['GITHUB_REPOSITORY']
          branch = os.environ['MIRROR_BRANCH']
          source_sha = os.environ['PRIMARY_SOURCE_SHA']
          expected_head = os.environ['EXPECTED_HEAD_SHA']
          owner = repository.split('/', 1)[0]
          api = f'https://api.github.com/repos/{repository}'
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'ELEMENTARY-Public-Startup-PR-Opener',
          }

          def request(method: str, url: str, payload: dict | None = None):
              data = None if payload is None else json.dumps(payload).encode('utf-8')
              req = urllib.request.Request(url, data=data, headers=headers, method=method)
              with urllib.request.urlopen(req, timeout=30) as response:
                  raw = response.read().decode('utf-8')
                  return json.loads(raw) if raw else {}

          query = urllib.parse.urlencode({
              'state': 'open',
              'head': f'{owner}:{branch}',
              'base': 'main',
          })
          existing = request('GET', f'{api}/pulls?{query}')
          title = f'Sync public startup mirror from {source_sha[:12]}'
          body = (
              '## Exact source binding\n\n'
              f'`PRIMARY_SOURCE_SHA={source_sha}`\n\n'
              f'`STARTUP_HEAD_SHA={expected_head}`\n\n'
              'Generated by the canonical primary startup payload builder and published to '
              'the dedicated `sync/public-startup-mirror` branch. The startup repository '
              'opened or updated this draft pull request through its bounded native opener.\n\n'
              'Merge remains blocked until `Public Startup Repository Validation` is terminal PASS.\n\n'
              '```text\n'
              'STARTUP_DIRECT_MAIN_PUSH=false\n'
              'STARTUP_AUTO_MERGE=false\n'
              'PRODUCTION_MUTATION=false\n'
              'RUNTIME_MUTATION=false\n'
              '```\n'
          )
          payload = {'title': title, 'body': body, 'base': 'main'}
          if existing:
              current = existing[0]
              if current.get('head', {}).get('sha') != expected_head:
                  raise SystemExit('PUBLIC_STARTUP_PR=FAIL existing_head_sha_mismatch')
              if current.get('draft') is not True:
                  raise SystemExit('PUBLIC_STARTUP_PR=FAIL existing_not_draft')
              number = current['number']
              result = request('PATCH', f'{api}/pulls/{number}', payload)
              action = 'UPDATED'
          else:
              payload.update({'head': branch, 'draft': True})
              result = request('POST', f'{api}/pulls', payload)
              number = result['number']
              action = 'OPENED'
          if result.get('state') != 'open':
              raise SystemExit('PUBLIC_STARTUP_PR=FAIL state_not_open')
          if result.get('base', {}).get('ref') != 'main':
              raise SystemExit('PUBLIC_STARTUP_PR=FAIL base_not_main')
          if result.get('head', {}).get('sha') != expected_head:
              raise SystemExit('PUBLIC_STARTUP_PR=FAIL head_sha_mismatch')
          if result.get('draft') is not True:
              raise SystemExit('PUBLIC_STARTUP_PR=FAIL not_draft')
          print(f'PUBLIC_STARTUP_PR={action} number={number} head_sha={expected_head}')
          print('STARTUP_AUTO_MERGE=false')
          PY

      - name: Report safety boundary
        shell: bash
        run: |
          set -euo pipefail
          echo 'PUBLIC_STARTUP_NATIVE_PR_OPENER=PASS'
          echo 'PUBLIC_STARTUP_REPOSITORY_DISPATCH_HANDLER=PASS'
          echo "PUBLIC_STARTUP_PR_OPENER_CONTRACT_VERSION=$OPENER_CONTRACT_VERSION"
          echo 'STARTUP_DIRECT_MAIN_PUSH=false'
          echo 'STARTUP_AUTO_MERGE=false'
          echo 'PRODUCTION_MUTATION=false'
          echo 'RUNTIME_MUTATION=false'
          echo 'SECRET_VALUES_COLLECTED=false'
