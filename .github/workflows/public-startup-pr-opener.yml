name: Public Startup PR Opener

on:
  push:
    branches:
      - sync/public-startup-mirror
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: public-startup-pr-opener
  cancel-in-progress: true

jobs:
  open-or-update:
    if: ${{ github.repository == 'borislavppetrov-beep/elementary-control-startup' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EXPECTED_HEAD_SHA: ${{ github.sha }}
      MIRROR_BRANCH: sync/public-startup-mirror
    steps:
      - name: Checkout exact startup branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.EXPECTED_HEAD_SHA }}
          fetch-depth: 1
          persist-credentials: false

      - name: Validate exact branch and payload source
        id: payload
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD_SHA"
          test "${GITHUB_REF_NAME}" = "$MIRROR_BRANCH"
          manifest='contracts/governance/public-startup-mirror-payload-manifest-v1.json'
          test -s "$manifest"
          source_sha="$(python3 - <<'PY'
          import json
          import pathlib
          import re

          path = pathlib.Path('contracts/governance/public-startup-mirror-payload-manifest-v1.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          assert data.get('schema') == 'elementary.public-startup-mirror-payload.v1'
          assert data.get('status') == 'PASS'
          source_sha = data.get('source_sha')
          assert isinstance(source_sha, str) and re.fullmatch(r'[0-9a-f]{40}', source_sha)
          assert data.get('forbidden_value_scan') == 'PASS'
          assert data.get('read_order_validated') is True
          print(source_sha)
          PY
          )"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "PUBLIC_STARTUP_PR_SOURCE_BINDING=PASS source_sha=$source_sha"

      - name: Open or update startup pull request
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PRIMARY_SOURCE_SHA: ${{ steps.payload.outputs.source_sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          token = os.environ['GH_TOKEN']
          repository = os.environ['GITHUB_REPOSITORY']
          branch = os.environ['MIRROR_BRANCH']
          source_sha = os.environ['PRIMARY_SOURCE_SHA']
          owner = repository.split('/', 1)[0]
          api = f'https://api.github.com/repos/{repository}'
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'ELEMENTARY-Public-Startup-PR-Opener',
          }

          def request(method: str, url: str, payload: dict | None = None):
              data = None if payload is None else json.dumps(payload).encode('utf-8')
              req = urllib.request.Request(url, data=data, headers=headers, method=method)
              with urllib.request.urlopen(req, timeout=30) as response:
                  raw = response.read().decode('utf-8')
                  return json.loads(raw) if raw else {}

          query = urllib.parse.urlencode({
              'state': 'open',
              'head': f'{owner}:{branch}',
              'base': 'main',
          })
          existing = request('GET', f'{api}/pulls?{query}')
          title = f'Sync public startup mirror from {source_sha[:12]}'
          body = (
              '## Exact source binding\n\n'
              f'`PRIMARY_SOURCE_SHA={source_sha}`\n\n'
              'Generated by the canonical primary startup payload builder and published to '
              'the dedicated `sync/public-startup-mirror` branch. This pull request was opened '
              'inside the public startup repository using its native GitHub Actions token.\n\n'
              'Merge remains blocked until `Public Startup Repository Validation` is terminal PASS.\n\n'
              '```text\n'
              'STARTUP_DIRECT_MAIN_PUSH=false\n'
              'STARTUP_AUTO_MERGE=false\n'
              'PRODUCTION_MUTATION=false\n'
              'RUNTIME_MUTATION=false\n'
              '```\n'
          )
          payload = {'title': title, 'body': body, 'base': 'main'}
          if existing:
              number = existing[0]['number']
              request('PATCH', f'{api}/pulls/{number}', payload)
              action = 'UPDATED'
          else:
              payload['head'] = branch
              result = request('POST', f'{api}/pulls', payload)
              number = result['number']
              action = 'OPENED'
          print(f'PUBLIC_STARTUP_PR={action} number={number}')
          print('STARTUP_AUTO_MERGE=false')
          PY

      - name: Report safety boundary
        shell: bash
        run: |
          set -euo pipefail
          echo 'PUBLIC_STARTUP_NATIVE_PR_OPENER=PASS'
          echo 'STARTUP_DIRECT_MAIN_PUSH=false'
          echo 'STARTUP_AUTO_MERGE=false'
          echo 'PRODUCTION_MUTATION=false'
          echo 'RUNTIME_MUTATION=false'
          echo 'SECRET_VALUES_COLLECTED=false'
