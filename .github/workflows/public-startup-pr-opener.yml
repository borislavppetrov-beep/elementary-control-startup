name: Public Startup PR Opener

on:
  push:
    branches:
      - sync/public-startup-mirror
  workflow_dispatch: {}
  repository_dispatch:
    types: [public-startup-mirror-published]

permissions:
  actions: read
  contents: read
  pull-requests: write

concurrency:
  group: public-startup-pr-opener-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.expected_head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  open-or-update:
    if: ${{ github.repository == 'borislavppetrov-beep/elementary-control-startup' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      expected_head_sha: ${{ steps.payload.outputs.head_sha }}
      primary_source_sha: ${{ steps.payload.outputs.source_sha }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
    env:
      EXPECTED_HEAD_SHA: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.expected_head_sha || github.sha }}
      REQUESTED_PRIMARY_SOURCE_SHA: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.primary_source_sha || '' }}
      MIRROR_BRANCH: sync/public-startup-mirror
      OPENER_CONTRACT_VERSION: "1.2.0"
    steps:
      - name: Checkout exact startup candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ env.EXPECTED_HEAD_SHA }}
          fetch-depth: 1
          persist-credentials: false

      - name: Validate repository dispatch and exact branch binding
        id: payload
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$OPENER_CONTRACT_VERSION" = '1.2.0'
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD_SHA"
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import re
          import urllib.parse
          import urllib.request

          expected = os.environ['EXPECTED_HEAD_SHA']
          requested_source = os.environ.get('REQUESTED_PRIMARY_SOURCE_SHA', '')
          branch = os.environ['MIRROR_BRANCH']
          repository = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GH_TOKEN']
          event_name = os.environ['GITHUB_EVENT_NAME']
          if re.fullmatch(r'[0-9a-f]{40}', expected) is None:
              raise SystemExit('PUBLIC_STARTUP_PR_BRANCH_BINDING=FAIL invalid_expected_head')
          if event_name == 'repository_dispatch':
              if re.fullmatch(r'[0-9a-f]{40}', requested_source) is None:
                  raise SystemExit('PUBLIC_STARTUP_REPOSITORY_DISPATCH=FAIL invalid_primary_source')
          elif requested_source:
              raise SystemExit('PUBLIC_STARTUP_REPOSITORY_DISPATCH=FAIL unexpected_primary_source')

          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'ELEMENTARY-Public-Startup-PR-Opener',
          }
          encoded_branch = urllib.parse.quote(branch, safe='')
          request = urllib.request.Request(
              f'https://api.github.com/repos/{repository}/git/ref/heads/{encoded_branch}',
              headers=headers,
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              remote = json.load(response).get('object', {}).get('sha')
          if remote != expected:
              raise SystemExit(
                  f'PUBLIC_STARTUP_PR_BRANCH_BINDING=FAIL expected={expected} remote={remote}'
              )

          manifest_path = pathlib.Path(
              'contracts/governance/public-startup-mirror-payload-manifest-v1.json'
          )
          data = json.loads(manifest_path.read_text(encoding='utf-8'))
          if data.get('schema') != 'elementary.public-startup-mirror-payload.v1':
              raise SystemExit('PUBLIC_STARTUP_PR_SOURCE_BINDING=FAIL invalid_schema')
          if data.get('status') != 'PASS':
              raise SystemExit('PUBLIC_STARTUP_PR_SOURCE_BINDING=FAIL invalid_status')
          source_sha = data.get('source_sha')
          if re.fullmatch(r'[0-9a-f]{40}', source_sha or '') is None:
              raise SystemExit('PUBLIC_STARTUP_PR_SOURCE_BINDING=FAIL invalid_source_sha')
          if requested_source and source_sha != requested_source:
              raise SystemExit(
                  f'PUBLIC_STARTUP_PR_SOURCE_BINDING=FAIL requested={requested_source} observed={source_sha}'
              )
          if data.get('forbidden_value_scan') != 'PASS':
              raise SystemExit('PUBLIC_STARTUP_PR_SOURCE_BINDING=FAIL forbidden_scan')
          if data.get('read_order_validated') is not True:
              raise SystemExit('PUBLIC_STARTUP_PR_SOURCE_BINDING=FAIL read_order')

          output = pathlib.Path(os.environ['GITHUB_OUTPUT'])
          with output.open('a', encoding='utf-8') as handle:
              handle.write(f'head_sha={expected}\n')
              handle.write(f'source_sha={source_sha}\n')
          print(f'PUBLIC_STARTUP_REPOSITORY_DISPATCH=PASS event={event_name}')
          print(f'PUBLIC_STARTUP_PR_BRANCH_BINDING=PASS head_sha={expected}')
          print(f'PUBLIC_STARTUP_PR_SOURCE_BINDING=PASS source_sha={source_sha}')
          PY

      - name: Open or update exact startup pull request
        id: pr
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PRIMARY_SOURCE_SHA: ${{ steps.payload.outputs.source_sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import urllib.parse
          import urllib.request

          token = os.environ['GH_TOKEN']
          repository = os.environ['GITHUB_REPOSITORY']
          branch = os.environ['MIRROR_BRANCH']
          source_sha = os.environ['PRIMARY_SOURCE_SHA']
          expected_head = os.environ['EXPECTED_HEAD_SHA']
          owner = repository.split('/', 1)[0]
          api = f'https://api.github.com/repos/{repository}'
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'Content-Type': 'application/json',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'ELEMENTARY-Public-Startup-PR-Opener',
          }

          def request(method: str, url: str, payload: dict | None = None):
              data = None if payload is None else json.dumps(payload).encode('utf-8')
              req = urllib.request.Request(url, data=data, headers=headers, method=method)
              with urllib.request.urlopen(req, timeout=30) as response:
                  raw = response.read().decode('utf-8')
                  return json.loads(raw) if raw else {}

          query = urllib.parse.urlencode({
              'state': 'open',
              'head': f'{owner}:{branch}',
              'base': 'main',
          })
          existing = request('GET', f'{api}/pulls?{query}')
          title = f'Sync public startup mirror from {source_sha[:12]}'
          body = (
              '## Exact source binding\n\n'
              f'`PRIMARY_SOURCE_SHA={source_sha}`\n\n'
              f'`STARTUP_HEAD_SHA={expected_head}`\n\n'
              'Generated by the canonical primary startup payload builder and published to '
              'the dedicated `sync/public-startup-mirror` branch. The startup repository '
              'opened or updated this draft pull request through its bounded native opener.\n\n'
              'Automatic validation is executed by the startup-owned reusable validation '
              'workflow on this exact PR head without manual approval.\n\n'
              '```text\n'
              'STARTUP_DIRECT_MAIN_PUSH=false\n'
              'STARTUP_AUTO_MERGE=false\n'
              'PRODUCTION_MUTATION=false\n'
              'RUNTIME_MUTATION=false\n'
              '```\n'
          )
          payload = {'title': title, 'body': body, 'base': 'main'}
          if existing:
              current = existing[0]
              if current.get('head', {}).get('sha') != expected_head:
                  raise SystemExit('PUBLIC_STARTUP_PR=FAIL existing_head_sha_mismatch')
              if current.get('draft') is not True:
                  raise SystemExit('PUBLIC_STARTUP_PR=FAIL existing_not_draft')
              number = current['number']
              result = request('PATCH', f'{api}/pulls/{number}', payload)
              action = 'UPDATED'
          else:
              payload.update({'head': branch, 'draft': True})
              result = request('POST', f'{api}/pulls', payload)
              number = result['number']
              action = 'OPENED'
          if result.get('state') != 'open':
              raise SystemExit('PUBLIC_STARTUP_PR=FAIL state_not_open')
          if result.get('base', {}).get('ref') != 'main':
              raise SystemExit('PUBLIC_STARTUP_PR=FAIL base_not_main')
          if result.get('head', {}).get('sha') != expected_head:
              raise SystemExit('PUBLIC_STARTUP_PR=FAIL head_sha_mismatch')
          if result.get('draft') is not True:
              raise SystemExit('PUBLIC_STARTUP_PR=FAIL not_draft')

          output = pathlib.Path(os.environ['GITHUB_OUTPUT'])
          with output.open('a', encoding='utf-8') as handle:
              handle.write(f'pr_number={number}\n')
              handle.write(f'pr_action={action}\n')
          print(f'PUBLIC_STARTUP_PR={action} number={number} head_sha={expected_head}')
          print('STARTUP_AUTO_MERGE=false')
          PY

      - name: Report opener safety boundary
        shell: bash
        run: |
          set -euo pipefail
          echo 'PUBLIC_STARTUP_NATIVE_PR_OPENER=PASS'
          echo 'PUBLIC_STARTUP_REPOSITORY_DISPATCH_HANDLER=PASS'
          echo 'PUBLIC_STARTUP_PR_JSON_CONTENT_TYPE=PASS'
          echo "PUBLIC_STARTUP_PR_OPENER_CONTRACT_VERSION=$OPENER_CONTRACT_VERSION"
          echo 'STARTUP_DIRECT_MAIN_PUSH=false'
          echo 'STARTUP_AUTO_MERGE=false'
          echo 'PRODUCTION_MUTATION=false'
          echo 'RUNTIME_MUTATION=false'
          echo 'SECRET_VALUES_COLLECTED=false'

  validate-created-pr:
    name: validate-created-startup-pr
    needs: open-or-update
    if: ${{ needs.open-or-update.result == 'success' }}
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/public-startup-repository-validation.yml
    with:
      expected_head_sha: ${{ needs.open-or-update.outputs.expected_head_sha }}
      primary_source_sha: ${{ needs.open-or-update.outputs.primary_source_sha }}
      pr_number: ${{ needs.open-or-update.outputs.pr_number }}

  record-automatic-validation:
    name: record-automatic-startup-validation
    needs: [open-or-update, validate-created-pr]
    if: ${{ needs.open-or-update.result == 'success' && needs.validate-created-pr.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      pull-requests: write
    env:
      EXPECTED_HEAD_SHA: ${{ needs.open-or-update.outputs.expected_head_sha }}
      PRIMARY_SOURCE_SHA: ${{ needs.open-or-update.outputs.primary_source_sha }}
      PR_NUMBER: ${{ needs.open-or-update.outputs.pr_number }}
    steps:
      - name: Record automatic validation evidence on exact PR
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import re
          import urllib.request

          token = os.environ['GH_TOKEN']
          repository = os.environ['GITHUB_REPOSITORY']
          run_id = os.environ['GITHUB_RUN_ID']
          expected_head = os.environ['EXPECTED_HEAD_SHA']
          source_sha = os.environ['PRIMARY_SOURCE_SHA']
          pr_number = os.environ['PR_NUMBER']
          if re.fullmatch(r'[0-9a-f]{40}', expected_head) is None:
              raise SystemExit('PUBLIC_STARTUP_AUTOMATIC_VALIDATION_EVIDENCE=FAIL invalid_head')
          if re.fullmatch(r'[0-9a-f]{40}', source_sha) is None:
              raise SystemExit('PUBLIC_STARTUP_AUTOMATIC_VALIDATION_EVIDENCE=FAIL invalid_source')
          if re.fullmatch(r'[1-9][0-9]*', pr_number) is None:
              raise SystemExit('PUBLIC_STARTUP_AUTOMATIC_VALIDATION_EVIDENCE=FAIL invalid_pr_number')

          api = f'https://api.github.com/repos/{repository}'
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'Content-Type': 'application/json',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'ELEMENTARY-Public-Startup-Validation-Recorder',
          }

          def request(method: str, url: str, payload: dict | None = None):
              data = None if payload is None else json.dumps(payload).encode('utf-8')
              req = urllib.request.Request(url, data=data, headers=headers, method=method)
              with urllib.request.urlopen(req, timeout=30) as response:
                  raw = response.read().decode('utf-8')
                  return json.loads(raw) if raw else {}

          pr = request('GET', f'{api}/pulls/{pr_number}')
          if pr.get('state') != 'open':
              raise SystemExit('PUBLIC_STARTUP_AUTOMATIC_VALIDATION_EVIDENCE=FAIL pr_not_open')
          if pr.get('draft') is not True:
              raise SystemExit('PUBLIC_STARTUP_AUTOMATIC_VALIDATION_EVIDENCE=FAIL pr_not_draft')
          if pr.get('base', {}).get('ref') != 'main':
              raise SystemExit('PUBLIC_STARTUP_AUTOMATIC_VALIDATION_EVIDENCE=FAIL base_not_main')
          if pr.get('head', {}).get('ref') != 'sync/public-startup-mirror':
              raise SystemExit('PUBLIC_STARTUP_AUTOMATIC_VALIDATION_EVIDENCE=FAIL head_ref')
          if pr.get('head', {}).get('sha') != expected_head:
              raise SystemExit('PUBLIC_STARTUP_AUTOMATIC_VALIDATION_EVIDENCE=FAIL head_sha')
          if pr.get('user', {}).get('login') != 'github-actions[bot]':
              raise SystemExit('PUBLIC_STARTUP_AUTOMATIC_VALIDATION_EVIDENCE=FAIL author')

          artifact_name = f'public-startup-repository-validation-{run_id}'
          artifacts = request(
              'GET',
              f'{api}/actions/runs/{run_id}/artifacts?per_page=100',
          ).get('artifacts', [])
          matches = [
              artifact for artifact in artifacts
              if artifact.get('name') == artifact_name and artifact.get('expired') is False
          ]
          if len(matches) != 1:
              raise SystemExit(
                  f'PUBLIC_STARTUP_AUTOMATIC_VALIDATION_EVIDENCE=FAIL artifact_count={len(matches)}'
              )
          artifact = matches[0]
          artifact_id = artifact.get('id')
          artifact_digest = artifact.get('digest')
          if not isinstance(artifact_id, int):
              raise SystemExit('PUBLIC_STARTUP_AUTOMATIC_VALIDATION_EVIDENCE=FAIL artifact_id')
          if re.fullmatch(r'sha256:[0-9a-f]{64}', artifact_digest or '') is None:
              raise SystemExit('PUBLIC_STARTUP_AUTOMATIC_VALIDATION_EVIDENCE=FAIL artifact_digest')

          body = pr.get('body') or ''
          source_marker = f'PRIMARY_SOURCE_SHA={source_sha}'
          if source_marker not in body:
              raise SystemExit('PUBLIC_STARTUP_AUTOMATIC_VALIDATION_EVIDENCE=FAIL source_marker')
          section_marker = '\n## Automatic startup validation\n'
          body = body.split(section_marker, 1)[0].rstrip()
          evidence = (
              f'{section_marker}\n'
              '`AUTOMATIC_STARTUP_VALIDATION=PASS`\n\n'
              f'`VALIDATION_RUN_ID={run_id}`\n\n'
              f'`VALIDATION_ARTIFACT_ID={artifact_id}`\n\n'
              f'`VALIDATION_ARTIFACT_DIGEST={artifact_digest}`\n\n'
              f'`VALIDATED_STARTUP_HEAD_SHA={expected_head}`\n\n'
              f'`VALIDATED_PRIMARY_SOURCE_SHA={source_sha}`\n\n'
              '`MANUAL_VALIDATION_APPROVAL_USED=false`\n'
          )
          updated = request('PATCH', f'{api}/pulls/{pr_number}', {'body': body + evidence})
          if updated.get('head', {}).get('sha') != expected_head:
              raise SystemExit('PUBLIC_STARTUP_AUTOMATIC_VALIDATION_EVIDENCE=FAIL updated_head')
          if updated.get('draft') is not True:
              raise SystemExit('PUBLIC_STARTUP_AUTOMATIC_VALIDATION_EVIDENCE=FAIL updated_not_draft')
          if 'AUTOMATIC_STARTUP_VALIDATION=PASS' not in (updated.get('body') or ''):
              raise SystemExit('PUBLIC_STARTUP_AUTOMATIC_VALIDATION_EVIDENCE=FAIL marker_missing')

          print(f'PUBLIC_STARTUP_AUTOMATIC_VALIDATION=PASS pr_number={pr_number}')
          print(f'PUBLIC_STARTUP_VALIDATION_RUN_ID={run_id}')
          print(f'PUBLIC_STARTUP_VALIDATION_ARTIFACT_ID={artifact_id}')
          print(f'PUBLIC_STARTUP_VALIDATION_ARTIFACT_DIGEST={artifact_digest}')
          print('MANUAL_VALIDATION_APPROVAL_USED=false')
          print('STARTUP_DIRECT_MAIN_PUSH=false')
          print('STARTUP_AUTO_MERGE=false')
          PY
