name: Startup Professional Execution Policy Validation
on:
  pull_request:
    branches: [main]
    paths:
      - "contracts/governance/chat-startup-context-bundle-v1.json"
      - "contracts/governance/professional-execution-policy-v1.json"
      - "docs/governance/PROFESSIONAL_EXECUTION_PROMPT_STANDARD.md"
      - "scripts/governance/validate_professional_execution_policy.py"
      - "tests/governance/**"
      - ".github/workflows/professional-execution-policy-validation.yml"
  push:
    branches: [main]
    paths:
      - "contracts/governance/chat-startup-context-bundle-v1.json"
      - "contracts/governance/professional-execution-policy-v1.json"
      - "docs/governance/PROFESSIONAL_EXECUTION_PROMPT_STANDARD.md"
      - "scripts/governance/validate_professional_execution_policy.py"
      - "tests/governance/**"
      - ".github/workflows/professional-execution-policy-validation.yml"
permissions:
  contents: read
concurrency:
  group: startup-professional-execution-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EXPECTED_SOURCE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      EXPECTED_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.sha }}
    steps:
      - name: Checkout exact source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.EXPECTED_SOURCE_SHA }}
          fetch-depth: 1
          persist-credentials: false
      - name: Verify exact head and current base
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_SOURCE_SHA"
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin main
            test "$(git rev-parse FETCH_HEAD)" = "$EXPECTED_BASE_SHA"
          fi
          echo EXACT_HEAD_BINDING=PASS
          echo EXACT_BASE_BINDING=PASS
      - name: Validate policy and bundle
        run: python scripts/governance/validate_professional_execution_policy.py
      - name: Test mutation gate
        run: python -m unittest tests.governance.test_professional_execution_policy
      - name: Validate JSON and secret scan
        shell: bash
        run: |
          set -euo pipefail
          python -m json.tool contracts/governance/professional-execution-policy-v1.json >/dev/null
          python -m json.tool contracts/governance/chat-startup-context-bundle-v1.json >/dev/null
          ! grep -RIE '(ghp_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}|-----BEGIN .*PRIVATE KEY-----)' contracts/governance docs/governance scripts/governance tests/governance
          echo SECRET_VALUE_SCAN=PASS
