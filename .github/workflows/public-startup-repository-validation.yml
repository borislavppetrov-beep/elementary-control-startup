name: Public Startup Repository Validation

on:
  workflow_call:
    inputs:
      expected_head_sha:
        required: true
        type: string
      primary_source_sha:
        required: true
        type: string
      pr_number:
        required: true
        type: string
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: public-startup-repository-validation-${{ inputs.pr_number || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: ${{ github.repository == 'borislavppetrov-beep/elementary-control-startup' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha || (github.event_name == 'pull_request' && github.event.pull_request.head.sha) || github.sha }}
      EXPECTED_PRIMARY_SOURCE_SHA: ${{ inputs.primary_source_sha || '' }}
      EXPECTED_PR_NUMBER: ${{ inputs.pr_number || github.event.pull_request.number || '' }}
      VALIDATION_MODE: ${{ inputs.expected_head_sha != '' && 'workflow_call' || github.event_name }}
    steps:
      - name: Checkout exact startup candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ env.EXPECTED_HEAD_SHA }}
          fetch-depth: 1
          persist-credentials: false

      - name: Validate exact source, PR binding, hashes, read order and policy links
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD_SHA"
          python3 - <<'PY'
          from __future__ import annotations
          import hashlib
          import json
          import os
          import pathlib
          import re
          import urllib.request

          root = pathlib.Path('.').resolve()
          manifest_rel = 'contracts/governance/public-startup-mirror-payload-manifest-v1.json'
          legacy_rel = 'MANIFEST.sha256'
          manifest_path = root / manifest_rel
          legacy_path = root / legacy_rel
          event_path = pathlib.Path(os.environ['GITHUB_EVENT_PATH'])
          expected_head = os.environ['EXPECTED_HEAD_SHA']
          expected_source = os.environ.get('EXPECTED_PRIMARY_SOURCE_SHA', '')
          expected_pr_number = os.environ.get('EXPECTED_PR_NUMBER', '')
          validation_mode = os.environ.get('VALIDATION_MODE', '')
          repository = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GH_TOKEN']

          def fail(code: str, detail: str) -> None:
              raise SystemExit(f'{code}=FAIL {detail}')

          def require(condition: bool, code: str, detail: str) -> None:
              if not condition:
                  fail(code, detail)

          def sha256_file(path: pathlib.Path) -> str:
              digest = hashlib.sha256()
              with path.open('rb') as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b''):
                      digest.update(chunk)
              return digest.hexdigest()

          def api_get(path: str) -> dict:
              request = urllib.request.Request(
                  f'https://api.github.com/repos/{repository}{path}',
                  headers={
                      'Accept': 'application/vnd.github+json',
                      'Authorization': f'Bearer {token}',
                      'X-GitHub-Api-Version': '2022-11-28',
                      'User-Agent': 'ELEMENTARY-Public-Startup-Repository-Validation',
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          require(
              re.fullmatch(r'[0-9a-f]{40}', expected_head) is not None,
              'PUBLIC_STARTUP_EXPECTED_HEAD_SHA',
              f'invalid={expected_head!r}',
          )
          require(manifest_path.is_file(), 'PUBLIC_STARTUP_MANIFEST', f'missing={manifest_rel}')
          require(legacy_path.is_file(), 'PUBLIC_STARTUP_LEGACY_MANIFEST', f'missing={legacy_rel}')
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          require(manifest.get('schema') == 'elementary.public-startup-mirror-payload.v1', 'PUBLIC_STARTUP_MANIFEST_SCHEMA', 'unexpected')
          require(manifest.get('status') == 'PASS', 'PUBLIC_STARTUP_MANIFEST_STATUS', 'expected=PASS')
          require(manifest.get('source_repository') == 'borislavppetrov-beep/elementary-construction-os', 'PUBLIC_STARTUP_SOURCE_REPOSITORY', 'unexpected')
          source_sha = manifest.get('source_sha')
          require(isinstance(source_sha, str) and re.fullmatch(r'[0-9a-f]{40}', source_sha) is not None, 'PUBLIC_STARTUP_SOURCE_SHA', f'invalid={source_sha!r}')
          require(manifest.get('forbidden_value_scan') == 'PASS', 'PUBLIC_STARTUP_FORBIDDEN_VALUE_SCAN', 'not_pass')
          require(manifest.get('read_order_validated') is True, 'PUBLIC_STARTUP_READ_ORDER_FLAG', 'not_true')

          if expected_source:
              require(
                  re.fullmatch(r'[0-9a-f]{40}', expected_source) is not None,
                  'PUBLIC_STARTUP_EXPECTED_PRIMARY_SOURCE_SHA',
                  f'invalid={expected_source!r}',
              )
              require(
                  expected_source == source_sha,
                  'PUBLIC_STARTUP_EXPECTED_PRIMARY_SOURCE_SHA',
                  f'expected={expected_source} manifest={source_sha}',
              )

          event = json.loads(event_path.read_text(encoding='utf-8'))
          pull_request = event.get('pull_request')
          pr_number: int | None = None
          if expected_pr_number:
              require(
                  re.fullmatch(r'[1-9][0-9]*', expected_pr_number) is not None,
                  'PUBLIC_STARTUP_PR_NUMBER',
                  f'invalid={expected_pr_number!r}',
              )
              pr_number = int(expected_pr_number)
              if not isinstance(pull_request, dict) or pull_request.get('number') != pr_number:
                  pull_request = api_get(f'/pulls/{pr_number}')

          if isinstance(pull_request, dict):
              body = pull_request.get('body') or ''
              match = re.search(r'PRIMARY_SOURCE_SHA=([0-9a-f]{40})', body)
              require(match is not None, 'PUBLIC_STARTUP_PR_SOURCE_BINDING', 'missing_primary_source_sha')
              require(match.group(1) == source_sha, 'PUBLIC_STARTUP_PR_SOURCE_BINDING', f'body={match.group(1)} manifest={source_sha}')
              require(pull_request.get('state') == 'open', 'PUBLIC_STARTUP_PR_STATE', 'not_open')
              require(pull_request.get('base', {}).get('ref') == 'main', 'PUBLIC_STARTUP_PR_BASE', 'not_main')
              require(pull_request.get('head', {}).get('sha') == expected_head, 'PUBLIC_STARTUP_PR_HEAD_SHA', 'mismatch')
              require(
                  pull_request.get('head', {}).get('repo', {}).get('full_name') == repository,
                  'PUBLIC_STARTUP_PR_HEAD_REPOSITORY',
                  'not_same_repository',
              )

              if validation_mode == 'workflow_call':
                  require(pr_number is not None, 'PUBLIC_STARTUP_AUTOMATIC_VALIDATION', 'missing_pr_number')
                  require(
                      pull_request.get('number') == pr_number,
                      'PUBLIC_STARTUP_AUTOMATIC_VALIDATION',
                      'pr_number_mismatch',
                  )
                  require(
                      pull_request.get('draft') is True,
                      'PUBLIC_STARTUP_AUTOMATIC_VALIDATION',
                      'pr_not_draft',
                  )
                  require(
                      pull_request.get('head', {}).get('ref') == 'sync/public-startup-mirror',
                      'PUBLIC_STARTUP_AUTOMATIC_VALIDATION',
                      'unexpected_head_ref',
                  )
                  require(
                      pull_request.get('user', {}).get('login') == 'github-actions[bot]',
                      'PUBLIC_STARTUP_AUTOMATIC_VALIDATION',
                      'unexpected_pr_author',
                  )
                  require(
                      expected_source == source_sha,
                      'PUBLIC_STARTUP_AUTOMATIC_VALIDATION',
                      'source_binding_missing',
                  )

          files = manifest.get('files')
          require(isinstance(files, list) and files, 'PUBLIC_STARTUP_MANIFEST_FILES', 'empty_or_invalid')
          require(manifest.get('file_count') == len(files), 'PUBLIC_STARTUP_FILE_COUNT', f"declared={manifest.get('file_count')} actual={len(files)}")
          seen: set[str] = set()
          expected_legacy: list[str] = []
          for index, item in enumerate(files):
              require(isinstance(item, dict), 'PUBLIC_STARTUP_MANIFEST_FILE', f'index={index} not_object')
              rel = item.get('path')
              expected_hash = item.get('sha256')
              require(isinstance(rel, str) and rel, 'PUBLIC_STARTUP_MANIFEST_FILE', f'index={index} missing_path')
              pure = pathlib.PurePosixPath(rel)
              require(not pure.is_absolute() and '..' not in pure.parts, 'PUBLIC_STARTUP_MANIFEST_PATH', f'unsafe={rel}')
              require(rel not in seen, 'PUBLIC_STARTUP_MANIFEST_PATH', f'duplicate={rel}')
              seen.add(rel)
              require(isinstance(expected_hash, str) and re.fullmatch(r'[0-9a-f]{64}', expected_hash) is not None, 'PUBLIC_STARTUP_MANIFEST_HASH', f'invalid={rel}')
              target = root / rel
              require(target.is_file(), 'PUBLIC_STARTUP_MANIFEST_FILE', f'missing={rel}')
              actual_hash = sha256_file(target)
              require(actual_hash == expected_hash, 'PUBLIC_STARTUP_MANIFEST_HASH', f'path={rel} expected={expected_hash} actual={actual_hash}')
              expected_legacy.append(f'{expected_hash}  {rel}')

          legacy_lines = [line for line in legacy_path.read_text(encoding='utf-8').splitlines() if line]
          require(legacy_lines == expected_legacy, 'PUBLIC_STARTUP_LEGACY_MANIFEST', 'content_or_order_mismatch')
          expected_tree = seen | {manifest_rel, legacy_rel}
          actual_tree = {path.relative_to(root).as_posix() for path in root.rglob('*') if path.is_file() and '.git' not in path.relative_to(root).parts}
          require(actual_tree == expected_tree, 'PUBLIC_STARTUP_REPOSITORY_TREE', f'missing={sorted(expected_tree - actual_tree)} extra={sorted(actual_tree - expected_tree)}')

          bundle_rel = 'contracts/governance/chat-startup-context-bundle-v1.json'
          policy_rel = 'contracts/governance/professional-execution-policy-v1.json'
          catalog_rel = 'contracts/governance/professional-execution-profile-catalog-v1.json'
          validator_rel = '.github/workflows/public-startup-repository-validation.yml'
          opener_rel = '.github/workflows/public-startup-pr-opener.yml'
          for rel in (bundle_rel, policy_rel, catalog_rel, validator_rel, opener_rel):
              require(rel in seen, 'PUBLIC_STARTUP_REQUIRED_FILE', f'missing_from_manifest={rel}')

          bundle = json.loads((root / bundle_rel).read_text(encoding='utf-8'))
          policy = json.loads((root / policy_rel).read_text(encoding='utf-8'))
          catalog = json.loads((root / catalog_rel).read_text(encoding='utf-8'))
          require(bundle.get('schema') == 'elementary.chat-startup-context-bundle.v1', 'PUBLIC_STARTUP_BUNDLE_SCHEMA', 'unexpected')
          require(policy.get('schema') == 'elementary.professional-execution-policy.v1' and policy.get('status') == 'ACTIVE', 'PUBLIC_STARTUP_POLICY', 'invalid')
          require(catalog.get('schema') == 'elementary.professional-execution-profile-catalog.v1' and catalog.get('status') == 'ACTIVE', 'PUBLIC_STARTUP_PROFILE_CATALOG', 'invalid')
          require(catalog.get('policy') == policy_rel, 'PUBLIC_STARTUP_PROFILE_CATALOG', 'policy_link_mismatch')
          rule = bundle.get('professional_execution_rule')
          require(isinstance(rule, dict), 'PUBLIC_STARTUP_PROFESSIONAL_RULE', 'missing')
          require(rule.get('policy') == policy_rel, 'PUBLIC_STARTUP_PROFESSIONAL_RULE', 'policy_link_mismatch')
          require(rule.get('profile_catalog') == catalog_rel, 'PUBLIC_STARTUP_PROFESSIONAL_RULE', 'catalog_link_mismatch')
          require(rule.get('unknown_profile_fails_closed') is True, 'PUBLIC_STARTUP_PROFESSIONAL_RULE', 'unknown_profile_not_fail_closed')

          opener_text = (root / opener_rel).read_text(encoding='utf-8')
          opener_markers = (
              'sync/public-startup-mirror',
              'pull-requests:' + ' write',
              'actions:' + ' read',
              'github.token',
              'PRIMARY_SOURCE_SHA',
              'validate-created-pr:',
              'record-automatic-validation:',
              'AUTOMATIC_STARTUP_VALIDATION=PASS',
              'STARTUP_AUTO_MERGE=false',
          )
          for marker in opener_markers:
              require(marker in opener_text, 'PUBLIC_STARTUP_NATIVE_PR_OPENER', f'missing={marker}')
          require(re.search(r'git\s+push[^\n]*(?:HEAD:main|refs/heads/main)', opener_text) is None, 'PUBLIC_STARTUP_NATIVE_PR_OPENER', 'direct_main_push')
          auto_merge_pattern = r'\b(?:gh\s+pr\s+' + 'merge' + '|' + 'merge_' + 'pull_request' + '|' + '/' + 'merge' + r')\b'
          require(re.search(auto_merge_pattern, opener_text) is None, 'PUBLIC_STARTUP_NATIVE_PR_OPENER', 'automatic_merge')

          read_order: list[str] = []
          for item in bundle.get('read_order', []):
              if isinstance(item, str):
                  read_order.append(item)
              elif isinstance(item, dict):
                  value = item.get('path') or item.get('file')
                  if isinstance(value, str):
                      read_order.append(value)
          require(read_order and len(read_order) == len(set(read_order)), 'PUBLIC_STARTUP_READ_ORDER', 'empty_or_duplicate')
          missing_read_order = sorted(set(read_order) - seen)
          require(not missing_read_order, 'PUBLIC_STARTUP_READ_ORDER', f'missing_from_manifest={missing_read_order}')

          text_suffixes = {'.json', '.jsonl', '.md', '.txt', '.yml', '.yaml', '.py'}
          secret_patterns = [
              re.compile('ghp_' + r'[A-Za-z0-9_]{20,}'),
              re.compile('github_pat_' + r'[A-Za-z0-9_]{20,}'),
              re.compile('glpat-' + r'[A-Za-z0-9_-]{20,}'),
              re.compile('sk-' + r'[A-Za-z0-9]{20,}'),
              re.compile('-----BEGIN ' + r'(?:RSA |OPENSSH |EC |DSA |)?PRIVATE KEY-----'),
              re.compile('ADCP_WINDOWS_BROWSER_BRIDGE_TOKEN' + r'\s*=\s*[^\s]+'),
          ]
          for rel in sorted(seen):
              path = root / rel
              require(path.suffix in text_suffixes, 'PUBLIC_STARTUP_FILE_TYPE', f'unsupported={rel}')
              text = path.read_text(encoding='utf-8')
              for pattern in secret_patterns:
                  require(pattern.search(text) is None, 'PUBLIC_STARTUP_SECRET_SCAN', f'path={rel}')

          report = {
              'schema': 'elementary.public-startup-repository-validation.v1',
              'status': 'PASS',
              'validation_mode': validation_mode,
              'startup_head_sha': expected_head,
              'primary_source_sha': source_sha,
              'pr_number': pr_number,
              'file_count': len(files),
              'manifest_hash': sha256_file(manifest_path),
              'legacy_manifest_hash': sha256_file(legacy_path),
              'read_order_count': len(read_order),
              'secret_scan': 'PASS',
              'repository_tree': 'EXACT',
              'native_pr_opener': 'PASS',
              'manual_validation_approval_used': False,
          }
          pathlib.Path('public-startup-validation-report.json').write_text(json.dumps(report, indent=2) + '\n', encoding='utf-8')
          print('PUBLIC_STARTUP_REPOSITORY_VALIDATION=PASS')
          if validation_mode == 'workflow_call':
              print('PUBLIC_STARTUP_AUTOMATIC_VALIDATION=PASS')
              print('MANUAL_VALIDATION_APPROVAL_USED=false')
          print(f'PRIMARY_SOURCE_SHA={source_sha}')
          print(f'PUBLIC_STARTUP_FILE_COUNT={len(files)}')
          print(f'PUBLIC_STARTUP_READ_ORDER_COUNT={len(read_order)}')
          print('PUBLIC_STARTUP_NATIVE_PR_OPENER=PASS')
          print('PUBLIC_STARTUP_SECRET_SCAN=PASS')
          print('PUBLIC_STARTUP_REPOSITORY_TREE=EXACT')
          PY

      - name: Upload validation evidence
        uses: actions/upload-artifact@v4
        with:
          name: public-startup-repository-validation-${{ github.run_id }}
          path: public-startup-validation-report.json
          if-no-files-found: error
          retention-days: 30

      - name: Report safety boundary
        shell: bash
        run: |
          set -euo pipefail
          echo 'STARTUP_DIRECT_MAIN_PUSH=false'
          echo 'STARTUP_AUTO_MERGE=false'
          echo 'PRODUCTION_MUTATION=false'
          echo 'RUNTIME_MUTATION=false'
          echo 'SECRET_VALUES_COLLECTED=false'
